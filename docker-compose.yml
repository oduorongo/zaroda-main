# ============================================================
# ZARODA SCHOOL MANAGEMENT SYSTEM
# docker-compose.yml — Development Stack
# ============================================================

version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zaroda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       zaroda_sms
      POSTGRES_USER:     zaroda_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/001_auth_tenant_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zaroda_app -d zaroda_sms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zaroda_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: zaroda_backend
    restart: unless-stopped
    environment:
      NODE_ENV:           development
      DATABASE_URL:       postgresql://zaroda_app:${POSTGRES_PASSWORD}@postgres:5432/zaroda_sms
      REDIS_URL:          redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:         ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      MPESA_CONSUMER_KEY:    ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_SHORTCODE:       ${MPESA_SHORTCODE}
      MPESA_PASSKEY:         ${MPESA_PASSKEY}
      SMS_API_KEY:        ${SMS_API_KEY}
      SMTP_HOST:          ${SMTP_HOST}
      SMTP_PORT:          587
      SMTP_USER:          ${SMTP_USER}
      SMTP_PASS:          ${SMTP_PASS}
      APP_URL:            http://localhost:3001
      FRONTEND_URL:       http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev

  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: zaroda_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL:    http://localhost:3001
      NEXT_PUBLIC_APP_NAME:   ZARODA SMS
      NEXT_PUBLIC_APP_URL:    http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

  # ── NGINX (reverse proxy in dev) ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: zaroda_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:

---
# ============================================================
# .env.example — copy to .env and fill in values
# NEVER commit .env to Git
# ============================================================

# Database
POSTGRES_PASSWORD=change_this_strong_password_here

# Redis
REDIS_PASSWORD=change_this_redis_password

# JWT (generate with: openssl rand -hex 64)
JWT_SECRET=generate_64_char_random_secret_here
JWT_REFRESH_SECRET=generate_different_64_char_secret

# Anthropic (for AI Professional Records, report comments)
ANTHROPIC_API_KEY=sk-ant-...

# M-Pesa Daraja API (Safaricom)
MPESA_CONSUMER_KEY=your_mpesa_consumer_key
MPESA_CONSUMER_SECRET=your_mpesa_consumer_secret
MPESA_SHORTCODE=your_paybill_or_till_number
MPESA_PASSKEY=your_lipa_na_mpesa_passkey
MPESA_CALLBACK_URL=https://api.zarodasms.app/api/v1/payments/mpesa/callback

# SMS (Africa's Talking recommended for Kenya)
SMS_API_KEY=your_africas_talking_api_key
SMS_USERNAME=your_africas_talking_username
SMS_SENDER_ID=ZARODA

# Email (SMTP)
SMTP_HOST=smtp.your-provider.com
SMTP_PORT=587
SMTP_USER=noreply@zarodasolutions.app
SMTP_PASS=your_smtp_password

---
# ============================================================
# backend/Dockerfile
# ============================================================

FROM node:20-alpine AS base
WORKDIR /app
COPY package*.json ./

FROM base AS development
RUN npm install
COPY . .
EXPOSE 3001
CMD ["npm", "run", "start:dev"]

FROM base AS build
RUN npm ci --only=production
COPY . .
RUN npm run build

FROM node:20-alpine AS production
WORKDIR /app
COPY --from=build /app/dist ./dist
COPY --from=build /app/node_modules ./node_modules
COPY package*.json ./
EXPOSE 3001
USER node
CMD ["node", "dist/main.js"]

---
# ============================================================
# nginx/dev.conf
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Frontend
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   Host             $host;
        proxy_read_timeout 120s;
    }
}

